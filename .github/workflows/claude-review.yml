name: Claude Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@claude')
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-5"
          direct_prompt: |
            Review this pull request for the pyzx library, a Python library for 
            quantum circuit optimization using ZX-calculus. Focus on:
            - Correctness of the proposed implementation and for PRs whether it indeed fully addresses the issue
            - Python code quality and consistency with the existing codebase
            - Test coverage for new functionality
            - Documentation and docstrings
            Post your review as inline comments on the diff where relevant.
